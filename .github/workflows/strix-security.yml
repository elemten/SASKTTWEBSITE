name: Strix Security Scan

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

jobs:
  security-scan:
    name: Run Strix Security Testing
    runs-on: ubuntu-latest
    
    # Only run if security-related files changed
    # Remove this if you want to run on all PRs
    # paths:
    #   - 'src/**'
    #   - 'supabase/functions/**'
    #   - '*.ts'
    #   - '*.tsx'
    #   - '*.js'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Strix
        run: |
          curl -sSL https://strix.ai/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Start application server
        run: |
          npm run preview &
          sleep 10 # Wait for server to start
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Strix Security Scan
        id: strix
        continue-on-error: true # Don't fail the workflow, just report
        run: |
          strix -n \
            --target http://localhost:4173 \
            --target ./src \
            --scan-mode quick \
            --instruction "Focus on authentication bypass, authorization flaws, injection vulnerabilities, and XSS"
        env:
          STRIX_LLM: ${{ secrets.STRIX_LLM || 'openai/gpt-5' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

      - name: Upload Strix Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strix-results
          path: strix_runs/
          retention-days: 30

      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Try to find and read Strix report
            const strixRunsDir = 'strix_runs';
            let reportContent = '## 🔒 Strix Security Scan Results\n\n';
            
            if (fs.existsSync(strixRunsDir)) {
              const runs = fs.readdirSync(strixRunsDir);
              if (runs.length > 0) {
                const latestRun = runs.sort().reverse()[0];
                const reportPath = path.join(strixRunsDir, latestRun, 'report.md');
                
                if (fs.existsSync(reportPath)) {
                  reportContent += fs.readFileSync(reportPath, 'utf8');
                } else {
                  reportContent += '✅ Security scan completed. Check artifacts for detailed results.\n\n';
                  reportContent += '⚠️ **Note:** Review the uploaded artifacts for full vulnerability details.';
                }
              } else {
                reportContent += '⚠️ No scan results found. Check workflow logs for details.';
              }
            } else {
              reportContent += '⚠️ Scan may have failed. Check workflow logs for details.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });

      - name: Fail if critical vulnerabilities found
        if: steps.strix.outcome == 'failure'
        run: |
          echo "🚨 Critical security vulnerabilities detected!"
          echo "Please review the Strix results and fix issues before merging."
          exit 1


